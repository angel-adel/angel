    <div class="container">        <h1 class="page-title">Ваше мнение важно!</h1>
        
        <div class="form-container">
            <form action="https://formsubmit.co/adel2026@f5.si" method="POST" id="feedback-form">
                <!-- Настройки FormSubmit -->
                <input type="hidden" name="_subject" value="📝 Новый отзыв о сайте Ádel">
                <input type="hidden" name="_captcha" value="false">

                <div class="form-group">

                <div class="form-group">
                    <label>Ваш Email <span class="optional">(необязательно)</span></label>
                    <input type="email" name="Email" placeholder="example@mail.ru (если хотите ответить)">
                </div>

                <div class="form-group">
                    <label class="rating-label">Оцените сайт <span class="required">*</span></label>

                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>

                        <span class="star" data-rating="4">★</span>

                    </div>

                </div>

    <script>
        // Рейтинг звёздочками
        const stars = document.querySelectorAll('.star');        const ratingInput = document.getElementById('rating-input');
        let selectedRating = 0;

        stars.forEach(star => {
            star.addEventListener('click', function() {
                selectedRating = parseInt(this.dataset.rating);
                ratingInput.value = selectedRating;
                
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.classList.add('selected');
                    } else {
                        s.classList.remove('selected');
                    }
                });
            });

            star.addEventListener('mouseenter', function() {
                const rating = parseInt(this.dataset.rating);
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= rating) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });

            star.addEventListener('mouseleave', function() {
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.classList.add('selected');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });

        // Обработка отправки формы
        document.getElementById('feedback-form').addEventListener('submit', function(e) {
            if (!selectedRating) {
                e.preventDefault();
                alert('Пожалуйста, поставьте оценку сайту! ⭐');
                return false;
            }
        });
    </script>
