<form id="feedbackForm" 
      action="https://formsubmit.co/adel2026@f5.si" 
      method="POST">
    
    <!-- Скрытые настройки FormSubmit -->
    <input type="hidden" name="_subject" value="💌 Новое сообщение с сайта Ádel">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="https://angel-adel.github.io/angel/thank-you-feedback.html">
    <input type="hidden" name="_template" value="table">
    
    <div class="form-group">
        <label for="name">Ваше имя *</label>
        <input type="text" id="name" name="name" required placeholder="Достаточно имени для связи">
    </div>
    
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Для ответа (необязательно)">
    </div>
    
    <div class="form-group">
        <label for="message">Сообщение *</label>
        <textarea id="message" name="message" required placeholder="Ваш отзыв, пожелания или вопрос..."></textarea>
    </div>
    
    <button type="submit" class="btn-submit">📬 Отправить сообщение</button>
</form>
