<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ádel CMS — Админка</title>
    <style>
        body { font-family: system-ui; background: #f5f2f0; padding: 2rem 1rem; }
        .card { background: white; border-radius: 24px; padding: 2rem; margin-bottom: 2rem; max-width: 1200px; margin: 0 auto 2rem auto; }
        .hidden { display: none; }
        label { font-weight: bold; display: block; margin-top: 1rem; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 4px; border-radius: 40px; border: 1px solid #ccc; font-family: inherit; }
        textarea { border-radius: 20px; font-family: monospace; }
        button { background: #7c3a8c; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; margin-top: 1rem; }
        .btn-outline { background: transparent; color: #7c3a8c; border: 1px solid #7c3a8c; }
        .flex { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px 4px; border-bottom: 1px solid #eee; vertical-align: top; }
        .error { background: #ffe0e0; color: #a00; padding: 10px; border-radius: 20px; margin-top: 1rem; }
        .ok { background: #e0f5e0; color: #070; padding: 10px; border-radius: 20px; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="card" id="loginPanel">
    <h2>🔐 Вход в CMS</h2>
    <label>Пароль</label>
    <input type="password" id="pwd">
    <label>GitHub токен</label>
    <input type="password" id="token">
    <button id="loginBtn">Войти</button>
    <div id="loginMsg"></div>
</div>

<div class="card hidden" id="adminPanel">
    <div class="flex">
        <select id="section">
            <option value="ru">📖 Русские стихи</option>
            <option value="bil">🌐 Иностранные стихи</option>
            <option value="prose">📓 Проза</option>
            <option value="humor">😄 Юмор</option>
            <option value="blog">📝 Блог</option>
        </select>
        <button id="refresh">🔄 Обновить</button>
        <button id="addNew" class="btn-outline">➕ Новая запись</button>
    </div>
    <div id="list"></div>
</div>

<div class="card hidden" id="editPanel">
    <h3 id="editTitle">Редактировать</h3>
    <div id="editFields"></div>
    <div class="flex">
        <button id="save">💾 Сохранить</button>
        <button id="cancel" class="btn-outline">Отмена</button>
    </div>
    <div id="editMsg"></div>
</div>

<script>
    const REPO = 'angel-adel/angel';
    let TOKEN = null;
    let currentSection = 'ru';
    let currentData = [];
    let editIndex = null;

    const FILES = {
        ru: 'russian_poems_only.json',
        bil: 'poems-bilingual.json',
        prose: 'prose.json',
        humor: 'humor.json',
        blog: 'blog.json'
    };

    const FIELDS = {
        ru: [
            { name: 'title', label: 'Название' },
            { name: 'content', label: 'Текст', type: 'textarea' }
        ],
        bil: [
            { name: 'title', label: 'Название' },
            { name: 'language', label: 'Язык', type: 'select', options: ['es','en'] },
            { name: 'content', label: 'Текст', type: 'textarea' }
        ],
        prose: [
            { name: 'title', label: 'Заголовок' },
            { name: 'description', label: 'Описание' },
            { name: 'fullText', label: 'Полный текст', type: 'textarea' },
            { name: 'date', label: 'Дата' }
        ],
        humor: [
            { name: 'title', label: 'Заголовок' },
            { name: 'content', label: 'Текст', type: 'textarea' }
        ],
        blog: [
            { name: 'title', label: 'Заголовок' },
            { name: 'date', label: 'Дата' },
            { name: 'content', label: 'Текст', type: 'textarea' }
        ]
    };

    document.getElementById('loginBtn').onclick = () => {
        const pwd = document.getElementById('pwd').value;
        const token = document.getElementById('token').value.trim();
        if (pwd !== 'adel2026admin') {
            document.getElementById('loginMsg').innerHTML = '<div class="error">❌ Неверный пароль</div>';
            return;
        }
        if (!token || (!token.startsWith('github_pat_') && !token.startsWith('ghp_'))) {
            document.getElementById('loginMsg').innerHTML = '<div class="error">❌ Неверный токен</div>';
            return;
        }
        TOKEN = token;
        document.getElementById('loginPanel').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadData();
    };

    async function loadData() {
        const container = document.getElementById('list');
        container.innerHTML = '⏳ Загрузка...';
        const file = FILES[currentSection];
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${file}`, {
                headers: { Authorization: `token ${TOKEN}` }
            });
            if (!res.ok) throw new Error(`Файл ${file} не найден`);
            const data = await res.json();
            const content = atob(data.content);
            currentData = JSON.parse(content);
            if (!Array.isArray(currentData)) currentData = [];
            renderList();
        } catch(e) {
            container.innerHTML = `<div class="error">❌ ${e.message}</div>`;
        }
    }

    function renderList() {
        const container = document.getElementById('list');
        if (!currentData.length) {
            container.innerHTML = '<p>📭 Нет записей</p>';
            return;
        }
        let html = '<table><thead><tr><th>Название</th><th>Кратко</th><th>Действия</th></tr></thead><tbody>';
        currentData.forEach((item, idx) => {
            const name = item.title || item.id || `Запись ${idx+1}`;
            let preview = '';
            if (item.content) preview = item.content.slice(0, 80) + (item.content.length > 80 ? '…' : '');
            else if (item.fullText) preview = item.fullText.slice(0, 80) + (item.fullText.length > 80 ? '…' : '');
            else if (item.description) preview = item.description.slice(0, 80);
            html += `<tr>
                        <td><strong>${escapeHtml(name)}</strong></td>
                        <td>${escapeHtml(preview)}</td>
                        <td>
                            <button class="editBtn" data-idx="${idx}">✏️ Ред.</button>
                            <button class="delBtn" data-idx="${idx}">🗑️ Удалить</button>
                        </td>
                     </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
        document.querySelectorAll('.editBtn').forEach(btn => {
            btn.onclick = () => editItem(parseInt(btn.dataset.idx));
        });
        document.querySelectorAll('.delBtn').forEach(btn => {
            btn.onclick = () => deleteItem(parseInt(btn.dataset.idx));
        });
    }

    function editItem(idx) {
        editIndex = idx;
        const item = currentData[idx];
        const fields = FIELDS[currentSection];
        const container = document.getElementById('editFields');
        container.innerHTML = '';
        for (let f of fields) {
            const label = document.createElement('label');
            label.textContent = f.label;
            container.appendChild(label);
            if (f.type === 'select') {
                const select = document.createElement('select');
                select.id = f.name;
                for (let opt of f.options) {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt.toUpperCase();
                    if (item[f.name] === opt) option.selected = true;
                    select.appendChild(option);
                }
                container.appendChild(select);
            } else if (f.type === 'textarea') {
                const ta = document.createElement('textarea');
                ta.id = f.name;
                ta.rows = 8;
                ta.value = item[f.name] || '';
                container.appendChild(ta);
            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.id = f.name;
                input.value = item[f.name] || '';
                container.appendChild(input);
            }
        }
        document.getElementById('editPanel').classList.remove('hidden');
        document.getElementById('editTitle').innerText = '✏️ Редактировать';
        document.getElementById('editMsg').innerHTML = '';
    }

    function addNew() {
        editIndex = null;
        const fields = FIELDS[currentSection];
        const container = document.getElementById('editFields');
        container.innerHTML = '';
        for (let f of fields) {
            const label = document.createElement('label');
            label.textContent = f.label;
            container.appendChild(label);
            if (f.type === 'select') {
                const select = document.createElement('select');
                select.id = f.name;
                for (let opt of f.options) {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt.toUpperCase();
                    select.appendChild(option);
                }
                container.appendChild(select);
            } else if (f.type === 'textarea') {
                const ta = document.createElement('textarea');
                ta.id = f.name;
                ta.rows = 8;
                container.appendChild(ta);
            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.id = f.name;
                container.appendChild(input);
            }
        }
        document.getElementById('editPanel').classList.remove('hidden');
        document.getElementById('editTitle').innerText = '➕ Новая запись';
        document.getElementById('editMsg').innerHTML = '';
    }

    async function saveItem() {
        const fields = FIELDS[currentSection];
        const newItem = {};
        for (let f of fields) {
            const el = document.getElementById(f.name);
            if (el) newItem[f.name] = el.value.trim();
        }
        if (editIndex !== null) {
            currentData[editIndex] = { ...currentData[editIndex], ...newItem };
        } else {
            if (currentSection === 'blog' || currentSection === 'prose') {
                newItem.id = Date.now();
            }
            currentData.push(newItem);
        }
        await saveToGithub();
    }

    async function deleteItem(idx) {
        if (!confirm('Удалить запись?')) return;
        currentData.splice(idx, 1);
        await saveToGithub();
    }

    async function saveToGithub() {
        const msgDiv = document.getElementById('editMsg');
        const file = FILES[currentSection];
        try {
            const url = `https://api.github.com/repos/${REPO}/contents/${file}`;
            const res = await fetch(url, { headers: { Authorization: `token ${TOKEN}` } });
            const fileData = await res.json();
            const newBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
            await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'CMS update', content: newBase64, sha: fileData.sha })
            });
            document.getElementById('editPanel').classList.add('hidden');
            await loadData();
        } catch(e) {
            msgDiv.innerHTML = `<div class="error">❌ Ошибка сохранения: ${e.message}</div>`;
        }
    }

    document.getElementById('section').onchange = () => {
        currentSection = document.getElementById('section').value;
        loadData();
    };
    document.getElementById('refresh').onclick = () => loadData();
    document.getElementById('addNew').onclick = addNew;
    document.getElementById('save').onclick = saveItem;
    document.getElementById('cancel').onclick = () => document.getElementById('editPanel').classList.add('hidden');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
</script>
</body>
    </html>
