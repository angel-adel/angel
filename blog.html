<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Блог Крылатой — Ádel</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-post {
            background: white;
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: var(--border);
            transition: 0.2s;
        }
        .blog-post:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        .blog-title {
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }
        .blog-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--accent-light);
            padding-bottom: 0.5rem;
        }
        .blog-content {
            line-height: 1.7;
            font-size: 1rem;
        }
        .blog-content p {
            margin-bottom: 1rem;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">Ádel</a></div>
            <ul class="nav-links" id="navLinks"></ul>
        </nav>
    </header>

    <main>
        <h1>📝 Блог Крылатой</h1>
        <p>Заметки, мысли, стихи с крыльев</p>

        <div id="blogContainer">
            <div class="loading">Загрузка записей...</div>
        </div>
    </main>

    <footer>
        <p>2026. Адель. Angel de la poesía. ✨</p>
        <a href="index.html">Главная</a> |
        <a href="about.html">Об авторе</a> |
        <a href="contacts.html">Контакты</a>
    </footer>

    <script src="menu.js"></script>
    <script>
        async function loadBlog() {
            const container = document.getElementById('blogContainer');
            try {
                const response = await fetch('blog.json?_=' + Date.now());
                if (!response.ok) throw new Error('Файл blog.json не найден');
                const posts = await response.json();
                
                if (!posts.length) {
                    container.innerHTML = '<p>📭 Пока нет записей в блоге. Скоро появятся.</p>';
                    return;
                }
                
                // Сортируем от новых к старым
                posts.sort((a, b) => b.id - a.id);
                
                container.innerHTML = posts.map(post => `
                    <div class="blog-post">
                        <div class="blog-title">${escapeHtml(post.title)}</div>
                        <div class="blog-date">📅 ${escapeHtml(post.date)}</div>
                        <div class="blog-content">
                            <p>${escapeHtml(post.content).replace(/\n/g, '<br>')}</p>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Ошибка загрузки блога:', error);
                container.innerHTML = '<p>❌ Не удалось загрузить записи. Попробуйте позже.</p>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadBlog();
    </script>
</body>
</html>
