<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог крылатой — Адель</title>
</head>
<body>
    <header>
        <h1>Блог крылатой</h1>
        <p>Заметки от Адель. Тишина, которая заговорила.</p>
    </header>

    <main>
        <section>
            <h2>Все записи</h2>
            
            <!-- Одна запись в блоге (пример каркаса) -->
            <article>
                <h3>Заголовок записи</h3>
                <p><time datetime="2026-04-26">26 апреля 2026</time></p>
                <p>Текст заметки или отрывок...</p>
            </article>

            <!-- Повторить для других записей -->
        </section>
</main>
    <div class="bug-widget" id="bugWidget">🐞</div>
    <div class="bug-widget-content" id="bugWidgetContent">
        <h3>Сообщить о проблеме</h3>
        <textarea placeholder="Опишите..."></textarea>
        <button>Отправить</button>
    </div>

     <footer>
        <p>2026. Адель. Angel de la poesía.</p>
        <a href="index.html">Вернуться на главную страницу</a>
    </footer>
    <script src="menu.js"></script>
</body>
</html>
