<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witty Humor — Анекдоты на крыльях</title>
    <meta name="description" content="Короткие, добрые и остроумные мини-сценки из жизни. Юмор на крыльях от Адель.">
    
    <!-- FAVICON -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header id="mainHeader"></header>

<div class="hero">
    <h1>Witty Humor</h1>
    <p>Анекдоты на крыльях — добрые, короткие, для улыбки ❤️</p>
</div>

<div class="features" id="jokesContainer">
    <div class="loading">📖 Загрузка анекдотов...</div>
</div>

<div class="cta-buttons">
    <a href="index.html" class="btn">← На главную</a>
    <a href="guestbook.html" class="btn">💌 Предложить свою шутку</a>
</div>

<footer>
    <p>© 2026 Ádel — Ангел Поэзии | <a href="witty_humor.html">Witty Humor — Анекдоты на крыльях</a> | Добрый юмор без обид ♥️</p>
</footer>

<script>
    let allJokes = [];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatJokeText(content) {
        // Преобразуем переносы \n в <p>
        if (!content) return '';
        const paragraphs = content.split('\n').filter(p => p.trim());
        return paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join('');
    }

    function copyJoke(button, title, content) {
        const jokeText = `${title}\n\n${content}`;
        navigator.clipboard.writeText(jokeText).then(() => {
            button.textContent = '✅ Скопировано!';
            setTimeout(() => button.textContent = '📋 Скопировать шутку', 2000);
        }).catch(() => {
            button.textContent = '❌ Ошибка';
            setTimeout(() => button.textContent = '📋 Скопировать шутку', 2000);
        });
    }

    function shareJoke(platform, title, content) {
        const jokeText = `${title}\n\n${content}`;
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(jokeText);
        
        let shareUrl = '';
        if (platform === 'vk') {
            shareUrl = `https://vk.com/share.php?url=${url}&title=${text}`;
        } else if (platform === 'ok') {
            shareUrl = `https://connect.ok.ru/dk?st.cmd=WidgetSharePreview&st.shareUrl=${url}&st.comments=${text}`;
        } else if (platform === 'tg') {
            shareUrl = `https://t.me/share/url?url=${url}&text=${text}`;
        }
        
        if (shareUrl) {
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }
    }

    async function loadJokes() {
        try {
            const response = await fetch('humor.json');
            if (!response.ok) throw new Error('Файл не найден');
            allJokes = await response.json();
            displayJokes(allJokes);
        } catch (error) {
            console.error('Error loading jokes:', error);
            document.getElementById('jokesContainer').innerHTML = 
                '<div class="alert">❌ Ошибка загрузки анекдотов. Пожалуйста, обновите страницу.</div>';
        }
    }

    function displayJokes(jokes) {
        const container = document.getElementById('jokesContainer');
        
        if (!jokes || jokes.length === 0) {
            container.innerHTML = '<div class="alert">😔 Пока нет анекдотов. Но вы можете предложить свой!</div>';
            return;
        }
        
        container.innerHTML = jokes.map((joke, index) => {
            const title = escapeHtml(joke.title);
            const content = joke.content;
            const formattedContent = formatJokeText(content);
            
            return `
                <div class="feature-card" data-id="${index}">
                    <h3>${title}</h3>
                    <div class="joke-text">
                        ${formattedContent}
                    </div>
                    <div class="joke-actions">
                        <button class="copy-btn" onclick="copyJoke(this, \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`)">📋 Скопировать шутку</button>
                        <button class="share-btn" onclick="shareJoke('vk', \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`)">📘 ВК</button>
                        <button class="share-btn" onclick="shareJoke('ok', \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`)">👥 ОК</button>
                        <button class="share-btn" onclick="shareJoke('tg', \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`)">📨 Telegram</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    loadJokes();
</script>
    <script src="menu.js"></script>
</body>
    </html>
