<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witty Humor | Ádel</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<header id="mainHeader"></header>

<div class="container">
    <h1 class="page-title">😄 Крылатый юмор</h1>
    <p style="text-align:center; color:#6b7b8f; margin-bottom:40px;">Короткие, добрые и остроумные мини-сценки из жизни</p>
    
    <div id="jokesGrid" class="features">
        <div style="text-align:center; padding:40px;">📖 Загрузка анекдотов...</div>
    </div>
</div>

<footer>
    <p>© 2025 Ádel — Ангел Поэзии</p>
</footer>

<script src="menu.js"></script>
<script>
    let allJokes = [];
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function copyJoke(btn, title, content) {
        const text = `${title}\n\n${content}`;
        try {
            await navigator.clipboard.writeText(text);
            btn.textContent = '✅ Скопировано!';
            setTimeout(() => btn.textContent = '📋 Скопировать', 2000);
        } catch(e) {
            btn.textContent = '❌ Ошибка';
            setTimeout(() => btn.textContent = '📋 Скопировать', 2000);
        }
    }
    
    function shareJoke(platform, title, content) {
        const text = `${title}\n\n${content}`;
        const url = encodeURIComponent(window.location.href);
        const encodedText = encodeURIComponent(text);
        let shareUrl = '';
        if (platform === 'vk') shareUrl = `https://vk.com/share.php?url=${url}&title=${encodedText}`;
        if (platform === 'tg') shareUrl = `https://t.me/share/url?url=${url}&text=${encodedText}`;
        if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
    }
    
    async function loadJokes() {
        try {
            const response = await fetch('humor.json');
            if (!response.ok) throw new Error();
            allJokes = await response.json();
            displayJokes();
        } catch(e) {
            document.getElementById('jokesGrid').innerHTML = '<div style="text-align:center; padding:40px;">❌ Ошибка загрузки анекдотов</div>';
        }
    }
    
    function displayJokes() {
        const container = document.getElementById('jokesGrid');
        if (!allJokes.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">😔 Пока нет анекдотов</div>';
            return;
        }
        container.innerHTML = allJokes.map((joke, i) => {
            const title = escapeHtml(joke.title);
            const content = joke.content;
            const contentHtml = content.split('\n').filter(p => p.trim()).map(p => `<p>${escapeHtml(p)}</p>`).join('');
            return `
                <div class="feature-card">
                    <h3>${title}</h3>
                    <div>${contentHtml}</div>
                    <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
                        <button class="action-btn" onclick="copyJoke(this, \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`)">📋 Скопировать</button>
                        <button class="action-btn" onclick="shareJoke('vk', \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`)">📘 ВК</button>
                        <button class="action-btn" onclick="shareJoke('tg', \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`)">📨 Telegram</button>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    loadJokes();
</script>
</body>
</html>
