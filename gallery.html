    <style>
        body { font-family: 'Georgia', serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; }
        .error { color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 12px; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 15px; border-radius: 12px; }
        img { max-width: 100%; border-radius: 12px; margin: 10px 0; }
    </style>

<body>
    <div class="container">
        <h1>🖼️ Тест галереи</h1>
        <div id="output">⏳ Проверяем доступ к папке...</div>
    </div>
    <script>
        const FOLDER_ID = '1rI8ioxYMlF5OZTUyvaHKCZyWatVs6SPH';
        const API_KEY = 'AIzaSyC8qrNzWmiSiYbwF2dt7frOyh7VZWgA5As';  // твой новый ключ
        
        async function test() {
            const out = document.getElementById('output');
            const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType)`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    out.innerHTML = `<div class="error">❌ Ошибка API: ${data.error.message}</div>`;
                    return;
                }
                if (!data.files || data.files.length === 0) {
                    out.innerHTML = `<div class="error">📂 Папка пуста или нет доступа.</div>`;
                    return;
                }
                const images = data.files.filter(f => f.mimeType.startsWith('image/'));
                if (images.length === 0) {
                    out.innerHTML = `<div class="error">🖼️ В папке нет изображений.</div>`;
                    return;
                }
                let html = `<div class="success">✅ Найдено картинок: ${images.length}</div>`;
                images.forEach(img => {
                    html += `<div><strong>${img.name}</strong><br><img src="https://drive.google.com/uc?export=view&id=${img.id}"></div>`;
                });
                out.innerHTML = html;
            } catch (err) {
                out.innerHTML = `<div class="error">❌ Ошибка: ${err.message}</div>`;
            }
        }
        test();
    </script>
</body>
