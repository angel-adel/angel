    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 { color: #764ba2; text-align: center; }
        .error { color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 8px; margin: 10px 0; }
        img { max-width: 100%; margin: 10px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Тест галереи</h1>
        <div id="output">⏳ Проверяем...</div>
    </div>

    <script>
        const FOLDER_ID = '1rI8ioxYMlF5OZTUyvaHKCZyWatVs6SPH';
        const API_KEY = 'AIzaSyC8qrNzWmiSiYbwF2dt7frOyh7VZWgA5As';
        const output = document.getElementById('output');

        async function testGallery() {
            output.innerHTML = '<div class="info">🔍 Проверяем доступ к папке Google Drive...</div>';
            
            try {
                // Пытаемся получить список файлов
                const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType)`;
                const response = await fetch(url);
                const data = await response.json();
                
                // Если есть ошибка API
                if (data.error) {
                    output.innerHTML = `
                        <div class="error">
                            ❌ Ошибка Google API:<br>
                            ${data.error.message}<br><br>
                            <strong>Что делать:</strong><br>
                            1. Убедись, что API ключ активирован для Drive API<br>
                            2. Проверь, что папка открыта для всех<br>
                            3. Попробуй создать новый ключ
                        </div>
                    `;
                    return;
                }
                
                // Если файлов нет
                if (!data.files || data.files.length === 0) {
                    output.innerHTML = `
                        <div class="error">
                            📂 Папка пуста или нет доступа.<br><br>
                            Проверь:<br>
                            • В папке есть картинки (JPG, PNG, GIF)?<br>
                            • Папка открыта для доступа "Все, у кого есть ссылка"?
                        </div>
                    `;
                    return;
                }
                
                // Фильтруем только картинки
                const images = data.files.filter(f => f.mimeType.startsWith('image/'));
                
                if (images.length === 0) {
                    output.innerHTML = '<div class="error">🖼️ В папке нет изображений (только другие файлы).</div>';
                    return;
                }
                
                // Показываем все картинки
                let html = `<div class="success">✅ Найдено изображений: ${images.length}</div>`;
                images.forEach(img => {
                    const imgUrl = `https://drive.google.com/uc?export=view&id=${img.id}`;
                    html += `
                        <div class="info">
                            <strong>📷 ${img.name}</strong><br>
                            <img src="${imgUrl}" alt="${img.name}">
                        </div>
                    `;
                });
                output.innerHTML = html;
                
            } catch (err) {
                output.innerHTML = `
                    <div class="error">
                        ❌ Ошибка соединения: ${err.message}<br><br>
                        Проверь интернет и попробуй обновить страницу.
                    </div>
                `;
            }
        }
        
        testGallery();
    </script>
</body>
