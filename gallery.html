<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея | Ádel</title>
    
    <!-- FAVICON -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Дополнительные стили только для галереи */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }
        
        .gallery-item {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }
        
        .gallery-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }
        
        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.03);
        }
        
        .gallery-caption {
            padding: 18px;
            text-align: center;
            color: #6b5a7e;
            font-weight: 500;
            border-top: 1px solid rgba(155, 123, 181, 0.2);
        }
        
        /* Модальное окно для просмотра фото */
        .gallery-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            cursor: pointer;
        }
        
        .gallery-modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px;
        }
        
        .gallery-modal-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .gallery-modal-close:hover {
            color: #cbb5df;
        }
        
        .empty-gallery {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            color: #8b6b9d;
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
            .gallery-item img {
                height: 160px;
            }
            .gallery-caption {
                padding: 12px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>

<header id="mainHeader"></header>

<div class="container">
    <h1 class="page-title">📸 Галерея</h1>
    
    <div id="galleryGrid" class="gallery-grid">
        <div class="empty-gallery">
            <p>✨ Загрузка изображений...</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Ádel — Ангел Поэзии</p>
    <p><a href="index.html">Главная</a> | <a href="gallery.html">Галерея</a></p>
</footer>

<!-- Модальное окно для просмотра фото -->
<div id="galleryModal" class="gallery-modal" onclick="closeGalleryModal()">
    <span class="gallery-modal-close">&times;</span>
    <img class="gallery-modal-content" id="modalImage">
</div>

<script src="menu.js"></script>
<script>
    // Список изображений для галереи
    // Добавь сюда свои фото — просто перечисли имена файлов
    const galleryImages = [
        { src: "IMG_20260320_010101_069.jpg", caption: "Ádel — Ангел Поэзии" },
        // Добавляй новые фото по этому образцу:
        // { src: "имя_файла.jpg", caption: "Подпись к фото" },
    ];
    
    function openGalleryModal(imgSrc) {
        const modal = document.getElementById('galleryModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = "block";
        modalImg.src = imgSrc;
        document.body.style.overflow = "hidden";
    }
    
    function closeGalleryModal() {
        document.getElementById('galleryModal').style.display = "none";
        document.body.style.overflow = "auto";
    }
    
    function displayGallery() {
        const grid = document.getElementById('galleryGrid');
        
        if (!galleryImages || galleryImages.length === 0) {
            grid.innerHTML = `
                <div class="empty-gallery">
                    <p>📷 В галерее пока нет изображений.</p>
                    <p style="font-size: 0.9em; margin-top: 10px;">Скоро они здесь появятся ✨</p>
                </div>
            `;
            return;
        }
        
        grid.innerHTML = galleryImages.map(item => `
            <div class="gallery-item" onclick="openGalleryModal('${item.src}')">
                <img src="${item.src}" alt="${item.caption}" loading="lazy">
                <div class="gallery-caption">${item.caption}</div>
            </div>
        `).join('');
    }
    
    // Закрытие по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeGalleryModal();
        }
    });
    
    displayGallery();
</script>

</body>
</html>
