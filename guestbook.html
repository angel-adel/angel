<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гостевая книга — Адель</title>
</head>
<body>
    <header>
        <h1>Гостевая книга</h1>
        <p>Оставь след. Тепло. Слово. Тишину.</p>
    </header>

    <main>
        <!-- Форма добавления записи -->
        <section>
            <h2>Написать в гостевую</h2>
            <form id="guestbookForm">
                <div>
                    <label for="guestName">Имя:</label>
                    <input type="text" id="guestName" required>
                </div>
                <div>
                    <label for="guestEmail">Email (необязательно):</label>
                    <input type="email" id="guestEmail">
                </div>
                <div>
                    <label for="guestMessage">Сообщение:</label>
                    <textarea id="guestMessage" rows="4" required></textarea>
                </div>
                <button type="submit">Отправить</button>
            </form>
        </section>

        <!-- Список записей -->
        <section>
            <h2>Записи гостей</h2>
            <div id="guestbookEntries">
                <!-- Сюда будут загружаться записи из Google Таблиц -->
                <!-- 
                <article>
                    <p><strong>Имя</strong> — <time>дата</time></p>
                    <p>Текст сообщения...</p>
                </article>
                -->
            </div>

            <!-- Заглушка -->
          <p id="guestbookPlaceholder">Пока ни одной записи. Будь первым.</p>
        </section>
    </main>

    <div class="bug-widget" id="bugWidget">🐞</div>
    <div class="bug-widget-content" id="bugWidgetContent">
        <h3>Сообщить о проблеме</h3>
        <textarea placeholder="Опишите..."></textarea>
        <button>Отправить</button>
    </div>

    <footer>
        <p>2026. Адель. Angel de la poesía.</p>
        <a href="index.html">Вернуться на главную страницу</a>
        <p>Адель. Angel de la poesía. Гостевая книга — место встречи.</p>
    </footer>

    <!-- TODO: потом подключим Google Таблицы и скрипт -->
</body>
</html>
