<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма заказа — Адель</title>
</head>
<body>
    <header>
        <h1>Форма заказа</h1>
        <p>Что ты хочешь от крылатой?</p>
    </header>

    <main>
        <section>
            <h2>Оформить запрос</h2>
            <form id="orderForm">
                <div>
                    <label for="orderName">Ваше имя:</label>
                    <input type="text" id="orderName" required>
                </div>
                <div>
                    <label for="orderEmail">Email:</label>
                    <input type="email" id="orderEmail" required>
                </div>
                <div>
                    <label for="orderType">Тип заказа:</label>
                    <select id="orderType">
                        <option value="poem">Стихотворение на заказ</option>
                        <option value="prose">Проза / рассказ</option>
                        <option value="translation">Перевод</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div>
                    <label for="orderDetails">Подробности:</label>
                    <textarea id="orderDetails" rows="5" required></textarea>
                </div>
                <button type="submit">Отправить заказ</button>
            </form>
        </section>
    </main>
        <div class="bug-widget" id="bugWidget">🐞</div>
    <div class="bug-widget-content" id="bugWidgetContent">
        <h3>Сообщить о проблеме</h3>
        <textarea placeholder="Опишите..."></textarea>
        <button>Отправить</button>
    </div>

     <footer>
        <p>2026. Адель. Angel de la poesía.</p>
        <a href="index.html">Вернуться на главную страницу</a>
         <p>Адель. Angel de la poesía. Заказы — но не спешка.</p>
    </footer>
       <script src="menu.js"></script>
    <!-- TODO: потом подключим логику отправки -->
</body>
</html>
