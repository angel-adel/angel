<form id="orderForm" 
      action="https://formsubmit.co/adel2026@f5.si" 
      method="POST">
    
    <!-- Скрытые настройки FormSubmit -->
    <input type="hidden" name="_subject" value="📝 Новый заказ произведения | Ádel">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="https://angel-adel.github.io/angel/thank-you.html">
    <input type="hidden" name="_template" value="table">
    
    <div class="form-group">
        <label for="name">Ваше имя *</label>
        <input type="text" id="name" name="name" required placeholder="Достаточно имени для связи">
    </div>
    
    <div class="form-group">
        <label for="phone">Телефон *</label>
        <input type="tel" id="phone" name="phone" required placeholder="+7 (___) ___-__-__">
    </div>
    
    <div class="form-group">
        <label for="birthdate">Дата рождения</label>
        <input type="date" id="birthdate" name="birthdate" placeholder="Необязательно, для личных произведений">
        <small>Необязательно, для личных произведений</small>
    </div>
    
    <div class="form-group">
        <label for="gender">Пол</label>
        <select id="gender" name="gender">
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="workType">Тип произведения *</label>
        <select id="workType" name="workType" required>
            <option value="">Выберите из списка...</option>
            <option value="poem">Стихотворение</option>
            <option value="song">Песня / Текст песни</option>
            <option value="greeting">Поздравление</option>
            <option value="dedication">Посвящение</option>
            <option value="humor">Шуточное произведение</option>
            <option value="lyric">Лирическое / О любви</option>
            <option value="birthday">На день рождения</option>
            <option value="wedding">На свадьбу</option>
            <option value="other">Другое</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="theme">Тема произведения *</label>
        <input type="text" id="theme" name="theme" required placeholder="О чем должно быть произведение">
        <small>Чем подробнее опишете, тем лучше получится произведение</small>
    </div>
    
    <div class="form-group">
        <label for="content">Содержание *</label>
        <textarea id="content" name="content" required placeholder="Опишите подробно, что хотите видеть в произведении"></textarea>
    </div>
    
    <div class="form-group">
        <label for="deadline">Желаемая дата выполнения</label>
        <input type="date" id="deadline" name="deadline" placeholder="Когда нужно готовое произведение">
        <small>Когда нужно готовое произведение</small>
    </div>
    
    <button type="submit" class="btn-submit">📬 Отправить заявку</button>
</form>
