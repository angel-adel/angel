<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Произведения — Ádel</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin: 2rem 0;
        }
        .filter-btn {
            background: var(--bg-light);
            border: 1px solid var(--accent-light);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .filter-btn:hover {
            background: var(--accent-light);
            color: white;
        }
        .filter-btn.active-filter {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .search-box {
            text-align: center;
            margin: 1.5rem 0;
        }
        .search-box input {
            padding: 0.7rem 1.5rem;
            width: 100%;
            max-width: 350px;
            border-radius: 40px;
            border: 1px solid var(--accent-light);
            font-size: 0.95rem;
        }
        .works-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: 2rem 0;
        }
        .work-card {
            background: white;
            border-radius: var(--radius-sm);
            padding: 1.2rem;
            border: var(--border);
            transition: all 0.2s;
            cursor: pointer;
        }
        .work-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        .work-title {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }
        .work-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .work-excerpt {
            color: var(--text-dark);
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .badge {
            background: var(--accent-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 20000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: var(--radius);
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .modal-close:hover {
            color: var(--accent);
        }
        .modal-title {
            color: var(--accent);
            margin-bottom: 1rem;
            padding-right: 2rem;
        }
        .modal-text {
            white-space: pre-wrap;
            line-height: 1.7;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">Ádel</a></div>
            <ul class="nav-links" id="navLinks"></ul>
        </nav>
    </header>

    <main>
        <h1>📖 Произведения</h1>
        <p>Поэзия, проза, переводы — от крылатой поэтессы</p>

        <div class="filters-bar">
            <button class="filter-btn active-filter" data-lang="all">🌍 Все языки</button>
            <button class="filter-btn" data-lang="ru">🇷🇺 Русский</button>
            <button class="filter-btn" data-lang="es">🇪🇸 Español</button>
            <button class="filter-btn" data-lang="en">🇬🇧 English</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию...">
        </div>

        <div id="worksContainer">
            <div class="loading">Загрузка произведений...</div>
        </div>
    </main>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-text" id="modalText"></div>
        </div>
    </div>

    <footer>
        <p>2026. Адель. Angel de la poesía. ✨</p>
        <a href="index.html">Главная</a> |
        <a href="about.html">Об авторе</a> |
        <a href="contacts.html">Контакты</a>
    </footer>

    <script src="menu.js"></script>
    <script>
        let allWorks = [];
        let activeLang = 'all';
        let searchTerm = '';

        async function loadWorks() {
            const container = document.getElementById('worksContainer');
            
            try {
                const [ruRes, biRes] = await Promise.all([
                    fetch('russian_poems_only.json?_=' + Date.now()),
                    fetch('poems-bilingual.json?_=' + Date.now())
                ]);
                
                const ruPoems = ruRes.ok ? await ruRes.json() : [];
                const biPoems = biRes.ok ? await biRes.json() : [];
                
                // Русские стихи
                const ruWorks = ruPoems.map(poem => ({
                    title: poem.title,
                    content: poem.content,
                    lang: 'ru',
                    firstLine: poem.content ? poem.content.split('\n')[0] : ''
                }));
                
                // Испанские/английские стихи
                const biWorks = biPoems.map(poem => ({
                    title: poem.title,
                    content: poem.content,
                    lang: poem.language || 'es',
                    firstLine: poem.content ? poem.content.split('\n')[0] : ''
                }));
                
                allWorks = [...ruWorks, ...biWorks];
                
                if (allWorks.length === 0) {
                    container.innerHTML = '<p>📭 Произведения пока не добавлены.</p>';
                    return;
                }
                
                applyFilters();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                container.innerHTML = '<p>❌ Не удалось загрузить произведения. Попробуйте позже.</p>';
            }
        }

        function applyFilters() {
            let filtered = allWorks;
            if (activeLang !== 'all') {
                filtered = filtered.filter(work => work.lang === activeLang);
            }
            if (searchTerm) {
                filtered = filtered.filter(work => work.title.toLowerCase().includes(searchTerm));
            }
            displayWorks(filtered);
        }

        function displayWorks(works) {
            const container = document.getElementById('worksContainer');
            
            if (!works.length) {
                container.innerHTML = '<p>😔 Ничего не найдено. Попробуйте другие фильтры.</p>';
                return;
            }
            
            container.innerHTML = works.map((work, idx) => `
                <div class="work-card" data-idx="${idx}">
                    <div class="work-title">${escapeHtml(work.title)}</div>
                    <div class="work-meta">
                        <span class="badge">${getLangName(work.lang)}</span>
                    </div>
                    <div class="work-excerpt">${escapeHtml(work.firstLine || work.content?.substring(0, 120) || '')}...</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.work-card').forEach(card => {
                card.addEventListener('click', () => {
                    const idx = parseInt(card.dataset.idx);
                    const work = works[idx];
                    if (work) openModal(work);
                });
            });
        }

        function openModal(work) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const text = document.getElementById('modalText');
            
            title.textContent = work.title;
            // Сохраняем переносы строк
            text.innerHTML = escapeHtml(work.content).replace(/\n/g, '<br>');
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function getLangName(lang) {
            const names = {
                ru: '🇷🇺 Русский',
                es: '🇪🇸 Español',
                en: '🇬🇧 English'
            };
            return names[lang] || lang;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.querySelectorAll('[data-lang]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active-filter'));
                btn.classList.add('active-filter');
                activeLang = btn.getAttribute('data-lang');
                applyFilters();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            applyFilters();
        });

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        loadWorks();
    </script>
</body>
</html>
