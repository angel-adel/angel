<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Произведения — Адель</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">Ádel</a></div>
            <ul class="nav-links" id="navLinks"></ul>
        </nav>
    </header>

    <main>
        <h1>Произведения Адель</h1>
        <p>Поэзия, проза, переводы — от крылатой поэтессы</p>

        <section>
            <h2>Фильтры и поиск</h2>
            <label for="searchInput">Поиск:</label>
            <input type="text" id="searchInput" placeholder="Название, строка...">
            
            <div>
                <span>Язык:</span>
                <button data-lang="all" class="active-filter">Все</button>
                <button data-lang="ru">Русский</button>
                <button data-lang="en">English</button>
                <button data-lang="es">Español</button>
            </div>
            
            <div>
                <span>Жанр:</span>
                <button data-genre="all" class="active-filter">Все</button>
                <button data-genre="lyrics">Лирика</button>
                <button data-genre="philosophy">Философия</button>
                <button data-genre="humor">Юмор</button>
                <button data-genre="prose">Проза</button>
            </div>
            
            <p>Найдено: <span id="countDisplay">0</span></p>
        </section>

        <section>
            <h2>Список произведений</h2>
            <div id="worksList">
                <p>Загрузка стихов...</p>
            </div>
        </section>
    </main>

    <div class="bug-widget" id="bugWidget">🐞</div>
    <div class="bug-widget-content" id="bugWidgetContent">
        <h3>Сообщить о проблеме</h3>
        <textarea placeholder="Опишите..."></textarea>
        <button>Отправить</button>
    </div>

    <footer>
        <p>2026. Адель. Angel de la poesía.</p>
        <a href="about.html">Об авторе</a>
    </footer>

    <script src="menu.js"></script>
    <script>
        let allWorks = [];
        let filteredWorks = [];

        // Загрузка JSON
        async function loadWorks() {
            try {
                const response = await fetch('russian_poems_only.json');
                const data = await response.json();
                // Предполагаем, что JSON — это массив объектов с полями: title, text, genre, lang, year и т.д.
                allWorks = data.map((poem, index) => ({
                    id: index,
                    title: poem.title || 'Без названия',
                    text: poem.text || poem.content || '',
                    genre: poem.genre || 'lyrics',
                    lang: poem.lang || 'ru',
                    year: poem.year || '—',
                    firstLine: (poem.text || '').split('\n')[0] || (poem.content || '').split('\n')[0] || '...'
                }));
                filteredWorks = [...allWorks];
                renderWorks();
            } catch (error) {
                console.error('Ошибка загрузки JSON:', error);
                document.getElementById('worksList').innerHTML = '<p>Не удалось загрузить произведения. Проверьте файл russian_poems_only.json</p>';
            }
        }

        // Отображение списка
        function renderWorks() {
            const container = document.getElementById('worksList');
            const countSpan = document.getElementById('countDisplay');
            
            if (filteredWorks.length === 0) {
                container.innerHTML = '<p>Ничего не найдено. Попробуйте изменить фильтры.</p>';
                countSpan.innerText = '0';
                return;
            }

            countSpan.innerText = filteredWorks.length;
            
            container.innerHTML = filteredWorks.map(work => `
                <article class="work-card" data-id="${work.id}" data-lang="${work.lang}" data-genre="${work.genre}">
                    <h3>${escapeHtml(work.title)}</h3>
                    <p><strong>Жанр:</strong> ${getGenreName(work.genre)}</p>
                    <p><strong>Язык:</strong> ${getLangName(work.lang)}</p>
                    <p><strong>Год:</strong> ${work.year}</p>
                    <p><strong>Первая строка:</strong> <em>${escapeHtml(work.firstLine)}</em></p>
                    <div class="work-actions">
                        <button class="copy-btn" data-text="${escapeHtml(work.text)}">📋 Скопировать</button>
                        <button class="read-btn" data-title="${escapeHtml(work.title)}" data-text="${escapeHtml(work.text)}">📖 Читать</button>
                        <button class="share-btn" data-title="${escapeHtml(work.title)}" data-text="${escapeHtml(work.firstLine)}">📤 Поделиться</button>
                    </div>
                </article>
                <hr>
            `).join('');

            // Добавляем обработчики после рендера
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(btn.dataset.text);
                    alert('Текст скопирован в буфер');
                });
            });

            document.querySelectorAll('.read-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    alert(`📖 ${btn.dataset.title}\n\n${btn.dataset.text.substring(0, 500)}...\n\n(Полный текст откроется позже)`);
                });
            });

            document.querySelectorAll('.share-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (navigator.share) {
                        navigator.share({
                            title: btn.dataset.title,
                            text: btn.dataset.text
                        });
                    } else {
                        alert(`Поделиться: "${btn.dataset.title}" — ${btn.dataset.text}`);
                    }
                });
            });
        }

        // Фильтрация
        function filterWorks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeLang = document.querySelector('[data-lang].active-filter')?.dataset.lang || 'all';
            const activeGenre = document.querySelector('[data-genre].active-filter')?.dataset.genre || 'all';

            filteredWorks = allWorks.filter(work => {
                const matchesSearch = work.title.toLowerCase().includes(searchTerm) || 
                                      work.text.toLowerCase().includes(searchTerm) ||
                                      work.firstLine.toLowerCase().includes(searchTerm);
                const matchesLang = activeLang === 'all' || work.lang === activeLang;
                const matchesGenre = activeGenre === 'all' || work.genre === activeGenre;
                return matchesSearch && matchesLang && matchesGenre;
            });
            renderWorks();
        }

        // Вспомогательные функции
        function getGenreName(genre) {
            const genres = {
                lyrics: 'Лирика',
                philosophy: 'Философия',
                humor: 'Юмор',
                prose: 'Проза'
            };
            return genres[genre] || genre;
        }

        function getLangName(lang) {
            const langs = {
                ru: 'Русский',
                en: 'English',
                es: 'Español'
            };
            return langs[lang] || lang;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Навешиваем фильтры
        function bindFilters() {
            document.querySelectorAll('[data-lang]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active-filter'));
                    btn.classList.add('active-filter');
                    filterWorks();
                });
            });

            document.querySelectorAll('[data-genre]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-genre]').forEach(b => b.classList.remove('active-filter'));
                    btn.classList.add('active-filter');
                    filterWorks();
                });
            });

            document.getElementById('searchInput').addEventListener('input', filterWorks);
        }

        // Запуск
        loadWorks().then(() => {
            bindFilters();
        });
    </script>
    <style>
        .active-filter {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }
        button {
            background: #eee;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            cursor: pointer;
            margin: 0.2rem;
        }
        .work-actions button {
            margin: 0.2rem 0.4rem;
            padding: 0.3rem 0.8rem;
        }
        hr {
            margin: 1rem 0;
        }
    </style>
</body>
</html>
